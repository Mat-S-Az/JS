<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratica01</title>
    <style>
        body {
            margin: 0%;
            padding: 0%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            height: 100vh;
            justify-items: center;
            align-items: center;
            background-color: bisque;
            font-family: Arial, Helvetica, sans-serif;
            
        }
        h1 {
            grid-column: 2;
            grid-row: 1;
            align-self: last baseline;
            color: rgb(24, 23, 23);
            text-shadow: 5px 5px 8px rgba(0, 0, 0, 0.144);
            
        }
        footer {
            grid-column: 2;
            grid-row: 3;
            align-self: baseline;
        }

        #divpai {
            display: flex;
            flex-direction: column;
            justify-items: center;
            align-items: center;
            padding: 10px;
            grid-column: 2;
            grid-row: 2;
            background-color: rgb(242, 247, 247);
            height: 70vh;
            width: 50vw;
            border-radius: 8px;
            box-shadow: 5px 5px 8px rgba(0, 0, 0, 0.209);

        }
        #paragrafo {
            justify-self: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #container{
            
            margin: 30px;
            aspect-ratio: 1 / 1;
            flex-grow: 1;
            max-height: 70%;
            width: 100%;
           

        }

        #container img{
            
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1 id="H">Hora do Dia</h1>
    <div id="divpai">
        <p id="paragrafo"></p>
        <div id="container">
            <img src="" alt="" id="imagem">
        </div>
       
    </div>
    <footer >
        <p id="rodape">Matheus Azevedo</p>
    </footer>
    <script>
        var agora = new Date()
        var hora = agora.getHours()
        var minuto = agora.getMinutes()
        var img = document.getElementById('imagem')
        var parag = document.getElementById('paragrafo')
        parag.innerHTML = `Agora são > ${hora}:${minuto}`
        if (hora < 10){
            img.src = "imagens/morning.jpg"
            document.body.style.backgroundColor = "#ffe9b3"
        } else if (hora < 14){
            img.src = "imagens/meiodia.jpg"
            document.body.style.backgroundColor = "#ffef9f"
        } else if (hora < 19){
            img.src = "imagens/afternoon.jpg"
            document.body.style.backgroundColor = "#f28303"
        } else {
            img.src = "imagens/night.jpg"
            document.body.style.backgroundColor = "#1a1a2e"
            document.getElementById('rodape').style.color = "#ffffff"
            document.getElementById('H').style.color = "#ffffff"

        }

    </script>


    
</body>
</html>
