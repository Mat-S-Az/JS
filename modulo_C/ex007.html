<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando numeros</title>
    <style>
        body {
            padding: 10px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: aliceblue;
            

        }
        h1{
            margin:20px;
            padding-top: 80px;
        }
        #res {
            padding-top: 20px;
            font-size: 1.5em;
            
        }

        #bloco {
            text-align: center;
            background-color: rgb(3, 67, 46);
            margin: 10px;
            height: 300px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="bloco">
        <h1>Calculando!</h1>
        <input type="number" name="tex1" id="tex1">
        <input type="number" name="tex2" id="tex2">
        <input type="button" value="Somar" onclick="somar()">
        <div id="res">Igual = </div>
    </div>

    <script>
        function somar(){
            var tn1 = document.getElementById('tex1')
            var tn2 = document.getElementById('tex2')
            var res = document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2 
            res.innerHTML = 'Igual = ' + s 
        }
        
    </script>
    
</body>
</html>
